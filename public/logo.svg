<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Red apple body with bite taken out -->
  <path d="M50 15 C30 15, 10 35, 15 60 C18 75, 30 90, 50 92 C70 90, 82 75, 85 60 C90 35, 70 15, 50 15 Z" fill="#DC2626"/>
  <!-- Bite mark (concave circle cut from right side) -->
  <circle cx="82" cy="42" r="18" fill="white"/>
  <!-- Stem -->
  <path d="M50 15 Q52 5, 48 2" stroke="#5D3A1A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Leaf -->
  <path d="M49 8 Q60 2, 65 8 Q60 12, 49 8 Z" fill="#22C55E"/>
  <!-- Subtle shine -->
  <ellipse cx="35" cy="40" rx="8" ry="12" fill="rgba(255,255,255,0.2)" transform="rotate(-20 35 40)"/>
</svg>
