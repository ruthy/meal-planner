<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="appleGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="45%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#991B1B"/>
    </radialGradient>
    <radialGradient id="biteGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FEF9C3"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </radialGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="60" cy="112" rx="28" ry="5" fill="rgba(0,0,0,0.08)"/>
  <!-- Apple body with natural shape -->
  <path d="M60 22 C38 18, 14 38, 18 65 C21 82, 32 98, 48 104 C54 106, 56 106, 60 105 C64 106, 66 106, 72 104 C88 98, 99 82, 102 65 C106 38, 82 18, 60 22 Z" fill="url(#appleGrad)"/>
  <!-- Top indentation -->
  <path d="M52 24 Q60 30, 68 24" fill="#991B1B" opacity="0.3"/>
  <!-- Bite mark - natural crescent -->
  <path d="M95 38 C108 42, 112 58, 105 68 C98 78, 85 72, 82 62 C79 52, 82 34, 95 38 Z" fill="url(#biteGrad)" stroke="#D4A44A" stroke-width="0.5"/>
  <!-- Bite teeth marks -->
  <path d="M92 44 L94 48 M96 46 L97 51 M100 50 L100 55" stroke="#C8962E" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
  <!-- Shine/highlight -->
  <path d="M38 35 Q42 30, 50 32 Q48 42, 38 45 Z" fill="rgba(255,255,255,0.35)"/>
  <ellipse cx="40" cy="50" rx="6" ry="14" fill="url(#shine)" transform="rotate(-15 40 50)"/>
  <!-- Stem -->
  <path d="M60 22 C59 16, 57 10, 55 6" stroke="#6B4226" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Leaf -->
  <path d="M56 12 Q66 4, 76 10 Q68 16, 56 12 Z" fill="#16A34A"/>
  <path d="M56 12 Q67 10, 76 10" stroke="#15803D" stroke-width="0.7" fill="none"/>
  <!-- Leaf vein -->
  <path d="M62 11 Q66 9, 70 10" stroke="#15803D" stroke-width="0.4" fill="none"/>
</svg>
